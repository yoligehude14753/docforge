name: Bug Report
description: Report a bug in DocForge
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click "Generate", the app...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Create a new project
        2. Upload a PDF
        3. Click "Analyze"
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: ai_provider
    attributes:
      label: AI provider
      options:
        - OpenAI
        - DeepSeek
        - Claude
        - Ollama
        - Not applicable
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: DocForge version
      placeholder: e.g. 0.1.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      render: shell
